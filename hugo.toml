baseURL = "https://benny-k.com/"
languageCode = "en-AU"
title = "Ben Karciauskas"
theme = "PaperMod"
defaultContentLanguage = "en"
hasCJKLanguage = false
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[pagination]
  pagerSize = 10

[params]
  env = "production"
  title = "Ben Karciauskas"
  description = "Solutions Architect by day, AI tinkerer by night. Helping enterprises figure out what to do with their data, and building AI agents that actually work."
  author = "Ben Karciauskas"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "G'day, I'm Ben"
    Content = "Solutions Architect by day, AI tinkerer by night. I spend most of my time helping enterprises figure out what to actually do with their data — and lately, building AI agents that do useful things instead of just demo well. When I'm not deep in architecture diagrams, I'm mountain biking, wrangling two kids under 7, or arguing with my AI assistant about whether it's actually 3am."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/chowgi"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/benkarciauskas"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[taxonomies]
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
